name: Deploy Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy sync functions
        run: |
          supabase functions deploy sync-shopify-orders --project-ref cpzkmzcohujpybcocipe --no-verify-jwt
          supabase functions deploy sync-shopify-products --project-ref cpzkmzcohujpybcocipe --no-verify-jwt
          supabase functions deploy sync-xero-invoices --project-ref cpzkmzcohujpybcocipe --no-verify-jwt
          supabase functions deploy sync-xero-purchase-orders --project-ref cpzkmzcohujpybcocipe --no-verify-jwt
          supabase functions deploy shopify-webhook-handler --project-ref cpzkmzcohujpybcocipe --no-verify-jwt
          supabase functions deploy sync-shopify-returns --project-ref cpzkmzcohujpybcocipe --no-verify-jwt
          supabase functions deploy register-shopify-webhooks --project-ref cpzkmzcohujpybcocipe --no-verify-jwt
          supabase functions deploy reconcile-daily --project-ref cpzkmzcohujpybcocipe --no-verify-jwt
          supabase functions deploy reconcile-shopify --project-ref cpzkmzcohujpybcocipe --no-verify-jwt
          supabase functions deploy recalc-demand --project-ref cpzkmzcohujpybcocipe --no-verify-jwt
          supabase functions deploy recalc-committed-stock --project-ref cpzkmzcohujpybcocipe --no-verify-jwt
          supabase functions deploy scan-invoice --project-ref cpzkmzcohujpybcocipe --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
